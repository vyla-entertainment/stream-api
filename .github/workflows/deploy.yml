name: Deploy API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/valya/api

            git remote set-url origin git@github.com:vyla-entertainment/stream-api.git || true

            git fetch origin main
            git reset --hard origin/main

            npm install --omit=dev

            pm2 reload api --update-env || pm2 restart api