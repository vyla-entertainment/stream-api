name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/stream-api

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            npm install

            chown -R www-data:www-data .
            chmod -R 755 .

            pm2 restart stream-api || pm2 start server.js --name stream-api

            pm2 save